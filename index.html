<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hot Takes Wall</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #18181b;
      --surface2: #1f1f23;
      --border: #27272a;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --agree: #22c55e;
      --disagree: #ef4444;
      --spicy: #f97316;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #f97316, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.4rem;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      margin-right: 6px;
      vertical-align: middle;
      transition: background 0.3s;
    }
    .status-dot.live { background: var(--agree); box-shadow: 0 0 6px var(--agree); }

    .container { max-width: 680px; margin: 0 auto; }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .form-card h2 {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.5;
      padding: 0.75rem 1rem;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
      height: 90px;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .char-counter {
      text-align: right;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.3rem;
      margin-bottom: 0.75rem;
      transition: color 0.15s;
    }
    .char-counter.over { color: var(--disagree); }

    .form-row { display: flex; gap: 0.75rem; align-items: center; }

    select {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.65rem 0.9rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    select:focus { border-color: var(--accent); }

    button[type="submit"] {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 0.6rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.65rem 1.4rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    button[type="submit"]:hover { background: var(--accent-hover); }
    button[type="submit"]:active { transform: scale(0.97); }
    button[type="submit"]:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .takes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .takes-header span { font-size: 0.8rem; color: var(--muted); }

    .filter-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2rem;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.3rem 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent-hover); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .takes-list { display: flex; flex-direction: column; gap: 1rem; }

    .take-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.9rem;
      padding: 1.25rem 1.25rem 1rem;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .take-meta { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.65rem; }

    .tag {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      background: rgba(99,102,241,0.15);
      color: var(--accent-hover);
      border: 1px solid rgba(99,102,241,0.25);
    }

    .take-text {
      font-size: 1rem;
      line-height: 1.55;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .reactions { display: flex; gap: 0.6rem; }

    .reaction-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2rem;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.35rem 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .reaction-btn:hover { transform: scale(1.07); }
    .reaction-btn:active { transform: scale(0.95); }
    .reaction-btn.agree:hover    { background: rgba(34,197,94,0.12); border-color: var(--agree); color: var(--agree); }
    .reaction-btn.disagree:hover { background: rgba(239,68,68,0.12); border-color: var(--disagree); color: var(--disagree); }
    .reaction-btn.spicy:hover    { background: rgba(249,115,22,0.12); border-color: var(--spicy); color: var(--spicy); }
    .reaction-btn .count { font-weight: 600; min-width: 1ch; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 3rem 1rem;
      font-size: 0.95rem;
    }

    .error-banner {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 0.6rem;
      color: var(--disagree);
      font-size: 0.85rem;
      padding: 0.7rem 1rem;
      margin-bottom: 1rem;
      display: none;
    }

    #bgCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.55;
    }

    .container { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>
  <div class="container">
    <header>
      <h1>🔥 Hot Takes Wall</h1>
      <p><span class="status-dot" id="statusDot"></span><span id="statusText">Connecting…</span></p>
    </header>

    <div class="error-banner" id="errorBanner"></div>

    <div class="form-card">
      <h2>Submit a take</h2>
      <textarea id="takeInput" placeholder="Your hottest take goes here…" maxlength="120"></textarea>
      <div class="char-counter"><span id="charCount">0</span> / 120</div>
      <div class="form-row">
        <select id="tagSelect">
          <option value="Tech">💻 Tech</option>
          <option value="Food">🍕 Food</option>
          <option value="Movies">🎬 Movies</option>
          <option value="Sports">⚽ Sports</option>
          <option value="Music">🎵 Music</option>
          <option value="Life">🌍 Life</option>
          <option value="AI">🤖 AI</option>
          <option value="Other">💬 Other</option>
        </select>
        <button type="submit" id="submitBtn" disabled>Drop it 🔥</button>
      </div>
    </div>

    <div class="takes-header">
      <strong id="takeCount">0 takes</strong>
      <span>updates live · click a reaction to vote</span>
    </div>

    <div class="filter-row" id="filterRow">
      <button class="filter-btn active" data-tag="All">All</button>
    </div>

    <div class="takes-list" id="takesList">
      <div class="empty">Connecting to database…</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://xuntfcegodwlicecffsy.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1bnRmY2Vnb2R3bGljZWNmZnN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyODcwMTksImV4cCI6MjA5Njg2MzAxOX0.dvnmV2-TP-O7Xuib-WZq2qntDDvKaHpNYkopcpKNrik';

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let takes = [];
    let activeFilter = 'All';

    const takeInput  = document.getElementById('takeInput');
    const charCount  = document.getElementById('charCount');
    const submitBtn  = document.getElementById('submitBtn');
    const takesList  = document.getElementById('takesList');
    const takeCount  = document.getElementById('takeCount');
    const tagSelect  = document.getElementById('tagSelect');
    const filterRow  = document.getElementById('filterRow');
    const statusDot  = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const errorBanner = document.getElementById('errorBanner');

    function setStatus(live) {
      statusDot.className = 'status-dot' + (live ? ' live' : '');
      statusText.textContent = live ? 'Live' : 'Reconnecting…';
    }

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.style.display = 'block';
      setTimeout(() => errorBanner.style.display = 'none', 4000);
    }

    takeInput.addEventListener('input', () => {
      const len = takeInput.value.length;
      charCount.textContent = len;
      charCount.parentElement.classList.toggle('over', len >= 120);
      submitBtn.disabled = len === 0;
    });

    submitBtn.addEventListener('click', async () => {
      const text = takeInput.value.trim();
      if (!text) return;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Posting…';

      const { error } = await db.from('takes').insert({ text, tag: tagSelect.value });

      submitBtn.textContent = 'Drop it 🔥';
      if (error) {
        showError('Failed to post: ' + error.message);
        submitBtn.disabled = false;
        return;
      }
      takeInput.value = '';
      charCount.textContent = '0';
      charCount.parentElement.classList.remove('over');
    });

    async function react(id, type) {
      const take = takes.find(t => t.id === id);
      if (!take) return;
      take[`${type}_count`]++;
      renderTakes();

      const { error } = await db.rpc('increment_reaction', { take_id: id, reaction: type });
      if (error) {
        take[`${type}_count`]--;
        renderTakes();
        showError('Reaction failed: ' + error.message);
      }
    }

    async function loadTakes() {
      const { data, error } = await db
        .from('takes')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) { showError('Could not load takes: ' + error.message); return; }
      takes = data;
      renderFilters();
      renderTakes();
    }

    function renderFilters() {
      const tags = ['All', ...new Set(takes.map(t => t.tag))];
      filterRow.innerHTML = tags.map(tag =>
        `<button class="filter-btn${tag === activeFilter ? ' active' : ''}" data-tag="${tag}">${tag}</button>`
      ).join('');
      filterRow.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeFilter = btn.dataset.tag;
          renderFilters();
          renderTakes();
        });
      });
    }

    function renderTakes() {
      const filtered = activeFilter === 'All' ? takes : takes.filter(t => t.tag === activeFilter);
      takeCount.textContent = `${takes.length} take${takes.length !== 1 ? 's' : ''}`;

      if (filtered.length === 0) {
        takesList.innerHTML = takes.length === 0
          ? '<div class="empty">No takes yet. Be the first to drop one.</div>'
          : '<div class="empty">No takes for this tag yet.</div>';
        return;
      }

      takesList.innerHTML = filtered.map(t => `
        <div class="take-card">
          <div class="take-meta"><span class="tag">${escHtml(t.tag)}</span></div>
          <p class="take-text">${escHtml(t.text)}</p>
          <div class="reactions">
            <button class="reaction-btn agree"    data-id="${t.id}" data-type="agree">
              👍 <span class="count">${t.agree_count}</span>
            </button>
            <button class="reaction-btn disagree" data-id="${t.id}" data-type="disagree">
              👎 <span class="count">${t.disagree_count}</span>
            </button>
            <button class="reaction-btn spicy"    data-id="${t.id}" data-type="spicy">
              🌶️ <span class="count">${t.spicy_count}</span>
            </button>
          </div>
        </div>
      `).join('');

      takesList.querySelectorAll('.reaction-btn').forEach(btn => {
        btn.addEventListener('click', () => react(btn.dataset.id, btn.dataset.type));
      });
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Real-time subscription — updates the wall live for all visitors
    db.channel('takes-changes')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'takes' }, payload => {
        takes.unshift(payload.new);
        renderFilters();
        renderTakes();
      })
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'takes' }, payload => {
        const idx = takes.findIndex(t => t.id === payload.new.id);
        if (idx !== -1) takes[idx] = payload.new;
        renderTakes();
      })
      .subscribe(status => setStatus(status === 'SUBSCRIBED'));

    loadTakes();
  </script>

  <script>
    /* ── Cow & Carrot background animation ── */
    const canvas = document.getElementById('bgCanvas');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Carrot {
      constructor() {
        this.reset();
      }
      reset() {
        this.x     = 60 + Math.random() * (canvas.width  - 120);
        this.y     = canvas.height * 0.55 + Math.random() * canvas.height * 0.38;
        this.size  = 26 + Math.random() * 14;
        this.scale = 1;
        this.eaten = false;
      }
      shrink() {
        this.scale = Math.max(0, this.scale - 0.06);
        if (this.scale === 0) this.eaten = true;
      }
      draw() {
        if (this.eaten) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.scale(this.scale, this.scale);
        ctx.globalAlpha = this.scale;
        ctx.font = this.size + 'px serif';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🥕', 0, 0);
        ctx.restore();
      }
    }

    const WALK = 'walk', APPROACH = 'approach', EAT = 'eat';

    class Cow {
      constructor(startX) {
        this.size    = 44 + Math.random() * 18;
        this.speed   = 0.55 + Math.random() * 1.1;
        this.bob     = Math.random() * Math.PI * 2;
        this.parts   = [];
        this._place(startX);
      }
      _place(x) {
        this.x      = x ?? -90;
        this.baseY  = canvas.height * 0.62 + (Math.random() - 0.5) * canvas.height * 0.28;
        this.y      = this.baseY;
        this.facing = 1;
        this.state  = WALK;
        this.target = null;
        this.eatT   = 0;
      }
      _findCarrot(carrots) {
        let best = null, bd = Infinity;
        for (const c of carrots) {
          if (c.eaten || c.scale < 0.4) continue;
          const dx = c.x - this.x, dy = c.y - this.baseY;
          const d  = Math.sqrt(dx*dx + dy*dy);
          if (d < 220 && d < bd) { best = c; bd = d; }
        }
        return best;
      }
      _puff() {
        for (let i = 0; i < 5; i++) {
          this.parts.push({
            x: this.x, y: this.y - this.size * 0.25,
            vx: (Math.random() - 0.5) * 3.5,
            vy: -Math.random() * 2.5 - 0.5,
            life: 1,
            glyph: ['✨','💚','🌿'][Math.floor(Math.random()*3)]
          });
        }
      }
      update(carrots) {
        const t = Date.now() / 1000;

        // age particles
        for (const p of this.parts) {
          p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life -= 0.028;
        }
        this.parts = this.parts.filter(p => p.life > 0);

        if (this.state === WALK) {
          if (!this.target) this.target = this._findCarrot(carrots);
          if (this.target && !this.target.eaten) {
            this.state = APPROACH;
          } else {
            this.x += this.speed;
            this.facing = 1;
            this.y = this.baseY + Math.sin(t * 2.2 + this.bob) * 2;
          }

        } else if (this.state === APPROACH) {
          if (!this.target || this.target.eaten) { this.target = null; this.state = WALK; return; }
          const dx = this.target.x - this.x;
          const dy = this.target.y - this.baseY;
          this.facing = dx > 0 ? 1 : -1;
          if (Math.abs(dx) < 14) {
            this.state  = EAT;
            this.eatT   = 90;
            this.baseY += dy * 0.4;
          } else {
            const d = Math.sqrt(dx*dx + dy*dy);
            this.x     += (dx / d) * this.speed * 1.6;
            this.baseY += (dy / d) * 0.6;
            this.y      = this.baseY + Math.sin(t * 3 + this.bob) * 2;
          }

        } else if (this.state === EAT) {
          this.eatT--;
          this.y = this.baseY + Math.sin(t * 9) * 5;
          if (this.target && !this.target.eaten) {
            this.target.shrink();
            if (this.eatT % 12 === 0) this._puff();
          }
          if (this.eatT <= 0) {
            this._puff();
            this.state  = WALK;
            this.target = null;
          }
        }

        if (this.x > canvas.width + 120) this._place();
      }
      draw() {
        for (const p of this.parts) {
          ctx.save();
          ctx.globalAlpha = Math.max(0, p.life) * 0.85;
          ctx.font = '15px serif';
          ctx.textAlign = 'center';
          ctx.fillText(p.glyph, p.x, p.y);
          ctx.restore();
        }

        ctx.save();
        ctx.translate(this.x, this.y);
        if (this.facing === -1) ctx.scale(-1, 1);
        ctx.font = this.size + 'px serif';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🐄', 0, 0);

        if (this.state === EAT && this.eatT > 30) {
          ctx.font = '20px serif';
          ctx.fillText('😋', this.facing * (this.size * 0.65), -this.size * 0.55);
        }
        ctx.restore();
      }
    }

    // Spawn cows spread across initial screen
    const cows = Array.from({ length: 4 }, (_, i) =>
      new Cow(80 + (canvas.width / 4) * i)
    );

    const carrots = Array.from({ length: 11 }, () => new Carrot());

    function maybeSpawnCarrot() {
      const alive = carrots.filter(c => !c.eaten).length;
      if (alive < 11) {
        const dead = carrots.find(c => c.eaten);
        if (dead) dead.reset(); else carrots.push(new Carrot());
      }
    }
    setInterval(maybeSpawnCarrot, 2200);

    function drawGrassGlow() {
      const g = ctx.createLinearGradient(0, canvas.height * 0.65, 0, canvas.height);
      g.addColorStop(0, 'rgba(34,197,94,0)');
      g.addColorStop(1, 'rgba(34,197,94,0.06)');
      ctx.fillStyle = g;
      ctx.fillRect(0, canvas.height * 0.65, canvas.width, canvas.height * 0.35);
    }

    (function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrassGlow();
      for (const c of carrots) c.draw();
      for (const cow of cows) { cow.update(carrots); cow.draw(); }
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
